# Lefthook pre-commit and pre-push hooks
# https://github.com/evilmartians/lefthook

pre-push:
  parallel: true
  commands:
    lint:
      run: npm run lint
    typecheck:
      run: npm run typecheck
    validate-docs:
      run: npm run validate-docs
    check-sizes:
      run: npm run check-sizes
    test:
      run: npm run test


services:
  app:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    env_file:
      - .env
    {{#if db_postgres}}
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "my-ai-runtime"
      POSTGRES_PASSWORD: "change_me"
      POSTGRES_DB: "my-ai-runtime"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U my-ai-runtime"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      DB_USER: "my-ai-runtime"
      DB_PASSWORD: "change_me"
      DB_HOST: db
      DB_NAME: "my-ai-runtime"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
    ports:
      - "127.0.0.1:6432:5432"
    depends_on:
      - db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U my-ai-runtime"]
      interval: 10s
      timeout: 5s
      retries: 5

  
  
volumes:
  
  pgdata:
  
  
{{/if}}
